---
# 全局变量配置

# 系统配置
system_timezone: "Asia/Shanghai"
system_locale: "en_US.UTF-8"

# 用户配置
system_users:
  - name: "www"
    group: "www"
    uid: 701
    shell: "/bin/bash"
    sudo: true
  - name: "rouser"
    group: "rouser"
    uid: 1000
    shell: "/bin/bash"
    sudo: false

# 目录结构
base_directories:
  - path: "/ROOT"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/BACKUP"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/bin"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/conf"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/data"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/sh"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/ROOT/log"
    owner: "www"
    group: "www"
    mode: "0755"
  - path: "/ROOT/server"
    owner: "www"
    group: "www"
    mode: "0755"
  - path: "/ROOT/www"
    owner: "www"
    group: "www"
    mode: "0755"

# 磁盘挂载配置
# 示例配置，根据实际设备路径修改
disk_mounts: []
# disk_mounts:
#   - device: "/dev/sdb1"
#     mount_path: "/data"
#     fstype: "ext4"
#     mode: "0755"
#   - device: "/dev/sdc1"
#     mount_path: "/backup"
#     fstype: "xfs"
#     mode: "0755"

# SSH 密钥同步配置
# 示例配置，根据实际需要修改
ssh_keys_config: []
# ssh_keys_config:
#   - user: "root"
#     group: "root"
#     home_dir: "/root"
#     ssh_keys:
#       - "ssh-rsa  root@ops-jumserver-11"
#   - user: "www"
#     group: "www"
#     home_dir: "/home/www"
#     ssh_keys:
#       - "ssh-rsa  rouser@online-jenkins-s1"
#   - user: "rouser"
#     group: "rouser"
#     home_dir: "/home/rouser"
#     ssh_keys:
#       - "ssh-rsa  rouser@online-jenkins-s1"

# 系统参数优化
sysctl_config:
  - key: "net.core.somaxconn"
    value: "65535"
  - key: "net.ipv4.tcp_max_syn_backlog"
    value: "65535"

# 软件版本
docker_version: "26.0.0"
git_version: ""
supervisor_version: ""

# Docker 配置
docker_data_root: "/data/docker"
docker_registry_mirrors:
  - "https://docker.mirrors.ustc.edu.cn"
  - "https://hub-mirror.c.163.com"
