---
- name: 设置系统时区
  timezone:
    name: "{{ system_timezone }}"

- name: 安装基础系统依赖 (RedHat/CentOS)
  yum:
    name:
      - epel-release
      - vim
      - wget
      - curl
      - htop
      - net-tools
      - telnet
      - lsof
      - rsync
      - unzip
      - bash-completion
    state: present
  when: ansible_os_family == 'RedHat'

- name: 安装基础系统依赖 (Debian/Ubuntu)
  apt:
    name:
      - vim
      - wget
      - curl
      - htop
      - net-tools
      - telnet
      - lsof
      - rsync
      - unzip
      - bash-completion
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'