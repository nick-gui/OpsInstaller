---
- name: 安装 Supervisor (RedHat/CentOS)
  yum:
    name: supervisor
    state: present
  when: ansible_os_family == 'RedHat'

- name: 安装 Supervisor (Debian/Ubuntu)
  apt:
    name: supervisor
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: 创建 Supervisor 配置目录
  file:
    path: "{{ supervisor_include_dir }}"
    state: directory
    mode: '0755'

- name: 下发 Supervisor 主配置文件 (RedHat/CentOS)
  template:
    src: supervisord.conf.j2
    dest: /etc/supervisord.conf
    mode: "0644"
  when: ansible_os_family == 'RedHat'

- name: 下发 Supervisor 主配置文件 (Debian/Ubuntu)
  template:
    src: supervisord.conf.j2
    dest: /etc/supervisor/supervisord.conf
    mode: "0644"
  when: ansible_os_family == 'Debian'

- name: 启动并启用 Supervisor 服务
  systemd:
    name: supervisord
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: 启动并启用 Supervisor 服务 (Debian/Ubuntu)
  systemd:
    name: supervisor
    state: started
    enabled: yes
  when: ansible_os_family == 'Debian'
