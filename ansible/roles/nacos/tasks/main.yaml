---
- name: 校验 Nacos 部署参数
  assert:
    that:
      - nacos_mode in ['standalone', 'cluster']
      - nacos_db_mode in ['compose', 'external']
      - nacos_auth_token | length >= 32
    fail_msg: "Nacos 参数非法，请检查 mode/db_mode/auth_token"

- name: 校验集群类型参数
  assert:
    that:
      - nacos_cluster_type in ['real', 'pseudo']
    fail_msg: "nacos_cluster_type 必须为 real 或 pseudo"
  when: nacos_mode == 'cluster'

- name: 真实集群校验节点列表
  assert:
    that:
      - nacos_cluster_nodes | length > 0
    fail_msg: "真实集群模式（real）必须提供 nacos_cluster_nodes"
  when: nacos_mode == 'cluster' and nacos_cluster_type == 'real'

- name: 伪集群校验节点数量
  assert:
    that:
      - nacos_pseudo_nodes | int >= 3
    fail_msg: "伪集群节点数不能少于 3"
  when: nacos_mode == 'cluster' and nacos_cluster_type == 'pseudo'

- name: 独立 MySQL 模式校验数据库参数
  assert:
    that:
      - nacos_db.host | length > 0
      - nacos_db.name | length > 0
      - nacos_db.user | length > 0
      - nacos_db.password | length > 0
    fail_msg: "external 模式下 nacos_db 参数不完整"
  when: nacos_db_mode == 'external'

- name: 设置 compose 模式数据库连接
  set_fact:
    nacos_db:
      host: "mysql"
      port: 3306
      name: "{{ nacos_db.name }}"
      user: "{{ nacos_db.user }}"
      password: "{{ nacos_db.password }}"
      params: "{{ nacos_db.params }}"
  when: nacos_db_mode == 'compose'

- name: 创建 Nacos 公共目录
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nacos_conf_dir }}"
    - "{{ nacos_mysql_data_dir }}"
    - "{{ nacos_mysql_init_dir }}"

- name: 从 GitHub 下载 Nacos SQL 初始化文件
  block:
    - name: 下载 mysql-schema.sql（主地址）
      get_url:
        url: "{{ nacos_sql_url_primary }}"
        dest: "{{ nacos_mysql_init_dir }}/mysql-schema.sql"
        mode: "0644"
        timeout: 30
  rescue:
    - name: 下载 mysql-schema.sql（备用地址）
      get_url:
        url: "{{ nacos_sql_url_fallback }}"
        dest: "{{ nacos_mysql_init_dir }}/mysql-schema.sql"
        mode: "0644"
        timeout: 30

- name: 确认 SQL 文件下载成功
  stat:
    path: "{{ nacos_mysql_init_dir }}/mysql-schema.sql"
  register: sql_file_stat

- name: 校验 SQL 文件存在
  assert:
    that:
      - sql_file_stat.stat.exists
      - sql_file_stat.stat.size > 0
    fail_msg: "mysql-schema.sql 下载失败，请检查网络或手动下载"

- name: 创建伪集群各节点 data/logs 目录
  file:
    path: "{{ item.1 }}/node{{ item.0 + 1 }}"
    state: directory
    mode: "0755"
  loop: "{{ range(nacos_pseudo_nodes | int) | list | product([nacos_data_dir, nacos_logs_dir]) | list }}"
  when: nacos_mode == 'cluster' and nacos_cluster_type == 'pseudo'

- name: 创建单机/真实集群 data/logs 目录
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nacos_data_dir }}"
    - "{{ nacos_logs_dir }}"
  when: not (nacos_mode == 'cluster' and nacos_cluster_type == 'pseudo')

- name: 下发 Nacos application.properties
  template:
    src: application.properties.j2
    dest: "{{ nacos_conf_dir }}/application.properties"
    mode: "0644"

- name: 下发 Nacos cluster.conf
  template:
    src: cluster.conf.j2
    dest: "{{ nacos_conf_dir }}/cluster.conf"
    mode: "0644"
  when: nacos_mode == 'cluster'

- name: 删除单机模式下多余的 cluster.conf
  file:
    path: "{{ nacos_conf_dir }}/cluster.conf"
    state: absent
  when: nacos_mode == 'standalone'

- name: 检查 Docker 命令
  command: docker --version
  changed_when: false
  args:
    warn: false

- name: 下发 Docker Compose 文件
  template:
    src: docker-compose.yml.j2
    dest: "{{ nacos_conf_dir }}/docker-compose.yml"
    mode: "0644"

- name: Docker Compose 部署 Nacos
  command: docker compose up -d
  args:
    chdir: "{{ nacos_conf_dir }}"
    warn: false
