---
# 运行模式: standalone | cluster（仅 Docker Compose 部署）
nacos_mode: "standalone"

# 版本: 默认 latest
nacos_version: "latest"

# 基础目录（所有资源统一存放）
nacos_base_dir: "/ROOT/data/nacos"
nacos_data_dir: "{{ nacos_base_dir }}/data"
nacos_logs_dir: "{{ nacos_base_dir }}/logs"
nacos_container_name: "nacos"
nacos_image: "nacos/nacos-server"

# 端口
nacos_http_port: 8848
nacos_grpc_port: 9848
nacos_grpc_tls_port: 9849
nacos_raft_port: 7848

# Console 独立部署（3.x 控制台与 Server 分离）
# 设为 true 时在当前节点部署 Console 容器；真实集群中仅需在一台机器上开启
nacos_deploy_console: true
nacos_console_port: 8080

# 集群类型: real（真实集群，多机部署）| pseudo（伪集群，单机多容器）
# 仅 nacos_mode=cluster 时生效
nacos_cluster_type: "real"

# 真实集群节点列表（nacos_cluster_type=real 时必填，格式: ["IP:8848","IP:8848"]）
nacos_cluster_nodes: []

# 伪集群配置（nacos_cluster_type=pseudo 时生效，单机多容器）
nacos_pseudo_nodes: 3           # 节点数量
nacos_pseudo_port_start: 8848   # 节点1 HTTP 起始端口
nacos_pseudo_port_step: 10      # 端口步长（节点1=8848, 节点2=8858, 节点3=8868）

# 数据库模式: compose | external
nacos_db_mode: "compose"
nacos_db:
  host: "127.0.0.1"
  port: 3306
  name: "nacos"
  user: "nacos"
  password: "nacos"
  params: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true"

# 认证配置（nacos_auth_token 必须为 Base64 编码，解码后 >= 32 字节）
nacos_auth_enabled: true
nacos_auth_token: "nNS7Uu+FjxLsb4OQ/Q1auNMnZiD5HnLXdhfPbVQWz7cHp1IfThC3Bk5dGv73gfU3"
nacos_auth_identity_key: "serverIdentity"
nacos_auth_identity_value: "security"
nacos_web_login_enabled: true

# Docker 资源与重启策略
nacos_docker_restart_policy: "always"

# Docker Compose 内置 MySQL 配置（nacos_db_mode=compose 时启用）
nacos_mysql_image: "mysql:8.0"
nacos_mysql_container_name: "nacos-mysql"
nacos_mysql_root_password: "root123456"
nacos_mysql_data_dir: "{{ nacos_base_dir }}/mysql"
nacos_mysql_init_dir: "{{ nacos_base_dir }}/mysql-init"

# Nacos SQL 初始化文件下载（从 GitHub 获取对应版本）
# latest 使用 master 分支，指定版本使用对应 tag
# 源地址: https://github.com/alibaba/nacos/blob/master/plugin-default-impl/nacos-default-datasource-plugin/nacos-datasource-plugin-mysql/src/main/resources/META-INF/mysql-schema.sql
nacos_sql_url_primary: "https://raw.githubusercontent.com/alibaba/nacos/{{ 'master' if nacos_version == 'latest' else nacos_version }}/plugin-default-impl/nacos-default-datasource-plugin/nacos-datasource-plugin-mysql/src/main/resources/META-INF/mysql-schema.sql"
nacos_sql_url_fallback: "https://mirror.ghproxy.com/https://raw.githubusercontent.com/alibaba/nacos/{{ 'master' if nacos_version == 'latest' else nacos_version }}/plugin-default-impl/nacos-default-datasource-plugin/nacos-datasource-plugin-mysql/src/main/resources/META-INF/mysql-schema.sql"
